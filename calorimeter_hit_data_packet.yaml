name: Calorimeter Hit Data Packet
description: >
  Data payload packets for the Mu2e Calorimeter subsystem. Each ROC has
  20 readout channels; each channel can have multiple hits per event window.
  The calorimeter data block for a single event begins with the Data Header
  Packet, followed by a variable number of Calo Hit Data Packets (one per hit,
  each variable length), and ends with a Calo Footer Packet.

  Each hit is formatted as a variable-length sequence of 16-byte Data Payload
  Packets. The hit begins with a 48-bit header (Detector Type + Board ID +
  Channel Number + 32 reserved bits), followed by tightly packed 12-bit ADC
  waveform samples, terminated by a Last Sample Marker (0xFFF), and ending with
  5 words of 12-bit online-reconstructed hit information, padded with zeros to
  fill the final packet.
subsystem_id: 0x1
subsystem_name: Calorimeter
packet_type: 0x6
variable_length: true

hit_header:
  description: >
    Fixed 48-bit header at the start of each hit (3 x 16-bit words).
  fields:
    - name: Detector Type
      bits: "15:13"
      word: 0
      size_bits: 3
      description: >
        3-bit subdetector type identifier within the calorimeter system.
      values:
        0x0: "CALO - main calorimeter"
        0x1: "CAPHRI - calorimeter photon reference system"
        0x2: "TRAD - tracker radiation monitor"
        0x3: "LASER - laser calibration system"

    - name: Board ID
      bits: "12:5"
      word: 0
      size_bits: 8
      description: >
        8-bit unique board identifier, ranging from 0 to 255.

    - name: Channel Number
      bits: "4:0"
      word: 0
      size_bits: 5
      description: >
        5-bit channel identifier on the board, ranging from 0 to 19.

    - name: Reserved for DIRAC A
      bits: "15:0"
      word: 1
      size_bits: 16
      description: >
        16-bit reserved field for DIRAC A. Reserved for future use.

    - name: Reserved for DIRAC B
      bits: "15:0"
      word: 2
      size_bits: 16
      description: >
        16-bit reserved field for DIRAC B. Reserved for future use.

waveform_samples:
  description: >
    Variable number of 12-bit ADC waveform samples packed tightly after the
    48-bit header, using as many 16-byte Data Payload Packets as necessary.
    Every 4 samples occupy exactly 3 x 16-bit words (4 * 12 bits = 48 bits = 3 words).
    Samples continue until the Last Sample Marker (0xFFF) is encountered.
    0xFFF is an unphysical value used as a sentinel.
  sample_size_bits: 12
  packing: "4 samples per 3 words (12-bit tightly packed)"
  sentinel: 0xFFF

hit_trailer:
  description: >
    5 words of 12-bit online-reconstructed hit information, immediately following
    the Last Sample Marker sentinel. These are filled by the ROC FPGA online
    reconstruction.
  fields:
    - name: Error Flag
      size_bits: 12
      description: >
        12-bit error flag field containing information about the quality of
        the hit (e.g., pileup, saturation, or other reconstruction errors).

    - name: Time (high 12 bits)
      size_bits: 12
      description: >
        High 12 bits of the 24-bit hit time. The time is the number of clock
        cycles from the start of the Event Window to the first sample of the hit.

    - name: Time (low 12 bits)
      size_bits: 12
      description: >
        Low 12 bits of the 24-bit hit time.

    - name: Index of Max Sample
      size_bits: 12
      description: >
        12-bit field giving the position (index) within the hit waveform of the
        absolute maximum sample value.

    - name: Number of Samples
      size_bits: 12
      description: >
        12-bit field giving the number of clock cycles from the start to the end
        of the hit (i.e., the hit duration in samples).

padding:
  description: >
    After the Number of Samples field, if any space remains in the current
    16-byte Data Payload Packet, the remainder is padded with zeros.

notes: >
  - Each hit occupies a variable number of complete 16-byte Data Payload Packets.
  - The hit is self-delimiting via the Last Sample Marker (0xFFF).
  - The Detector Type field identifies the sub-component within the calorimeter.
  - For DIRAC A/B reserved fields: these 32 bits are reserved for future purposes.
  - The hit trailer (5 x 12-bit words) is computed online in the ROC FPGA.
  - A calorimeter data block consists of: Data Header + N x Calo Hit Data Packets + Calo Footer Packet.
  - See also: calorimeter_hit_debugging_data_packet.yaml for the debug format.
