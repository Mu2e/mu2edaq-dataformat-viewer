name: DCS Reply Additional Block Read Payload Packet
description: >
  Additional payload packet for DCS Block Read replies. When a Block Read
  response requires more than 3 data words (which fit in the base DCS Reply
  Packet), additional 16-byte payload packets are appended. The number of
  such packets is indicated by the Block Op Additional Packet Count field in
  the DCS Reply Packet. Each packet carries 8 additional 16-bit data words.
packet_type: 0x8
size_bytes: 16
dma_channel: 1
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D8.y) prepended on
    transmission and stripped on receipt. 'y' is the packet sequence number
    (0-7, incrementing, wrapping).
  k_char: K28.0
  d_char: D8.y

fields:
  - name: Additional Block Read Data0
    bits: "15:0"
    word: 0
    size_bits: 16
    description: Additional block read data word 0.

  - name: Additional Block Read Data1
    bits: "15:0"
    word: 1
    size_bits: 16
    description: Additional block read data word 1.

  - name: Additional Block Read Data2
    bits: "15:0"
    word: 2
    size_bits: 16
    description: Additional block read data word 2.

  - name: Additional Block Read Data3
    bits: "15:0"
    word: 3
    size_bits: 16
    description: Additional block read data word 3.

  - name: Additional Block Read Data4
    bits: "15:0"
    word: 4
    size_bits: 16
    description: Additional block read data word 4.

  - name: Additional Block Read Data5
    bits: "15:0"
    word: 5
    size_bits: 16
    description: Additional block read data word 5.

  - name: Additional Block Read Data6
    bits: "15:0"
    word: 6
    size_bits: 16
    description: Additional block read data word 6.

  - name: Additional Block Read Data7
    bits: "15:0"
    word: 7
    size_bits: 16
    description: Additional block read data word 7.

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: >
      16-bit CRC for error detection. High byte in word 8 bits [15:8],
      low byte in word 8 bits [7:0].
