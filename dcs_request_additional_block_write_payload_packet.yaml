name: DCS Request Additional Block Write Payload Packet
description: >
  Additional payload packet for DCS Block Write operations. When a Block Write
  request requires more than 3 data words (which fit in the base DCS Request
  Packet), additional 16-byte payload packets are appended. The number of
  such packets is indicated by the Block Op Additional Packet Count field in
  the DCS Request Packet. Each packet carries 8 additional 16-bit data words.
packet_type: 0x7
size_bytes: 16
dma_channel: 1
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D7.y) prepended on
    transmission and stripped on receipt. 'y' is the packet sequence number
    (0-7, incrementing, wrapping).
  k_char: K28.0
  d_char: D7.y

fields:
  - name: Additional Block Write Data0
    bits: "15:0"
    word: 0
    size_bits: 16
    description: Additional block write data word 0.

  - name: Additional Block Write Data1
    bits: "15:0"
    word: 1
    size_bits: 16
    description: Additional block write data word 1.

  - name: Additional Block Write Data2
    bits: "15:0"
    word: 2
    size_bits: 16
    description: Additional block write data word 2.

  - name: Additional Block Write Data3
    bits: "15:0"
    word: 3
    size_bits: 16
    description: Additional block write data word 3.

  - name: Additional Block Write Data4
    bits: "15:0"
    word: 4
    size_bits: 16
    description: Additional block write data word 4.

  - name: Additional Block Write Data5
    bits: "15:0"
    word: 5
    size_bits: 16
    description: Additional block write data word 5.

  - name: Additional Block Write Data6
    bits: "15:0"
    word: 6
    size_bits: 16
    description: Additional block write data word 6.

  - name: Additional Block Write Data7
    bits: "15:0"
    word: 7
    size_bits: 16
    description: Additional block write data word 7.

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: >
      16-bit CRC for error detection. High byte in word 8 bits [15:8],
      low byte in word 8 bits [7:0].
