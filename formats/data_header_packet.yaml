name: Data Header Packet
description: >
  Data Header packet sent from the ROC to the DTC on DMA channel 0, in
  response to a Data Request Packet. Precedes zero or more Data Payload Packets
  for the same event window. Carries the Event Window Tag, packet count, subsystem
  identification, format version, status flags, and DTC error flags. The 8-bit
  Data Packet Format Version is intended as a persistent mapping to a particular
  packet type for the duration of the experiment, enabling data decoding even if
  packet definitions change.
packet_type: 0x5
size_bytes: 16
dma_channel: 0
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D5.y) prepended on
    transmission and stripped on receipt. 'y' is the packet sequence number
    (0-7, incrementing, wrapping).
  k_char: K28.0
  d_char: D5.y

fields:
  - name: Data Block Byte Count
    bits: "15:0"
    word: 0
    size_bits: 16
    description: >
      16-bit byte count for the entire data block (header + all payload packets).
      High byte in bits 15:8, low byte in bits 7:0.

  - name: Valid
    bits: "15"
    word: 1
    size_bits: 1
    description: Valid flag. Used by the DTC DMA engine.

  - name: DTC Errors
    bits: "14:11"
    word: 1
    size_bits: 4
    description: >
      4-bit field containing error flags identified at the DTC FPGA. Inserted
      by the DTC before the packet is passed to software.
    subfields:
      - name: SERDES PLL Lock Lost
        bits: "11"
        size_bits: 1
        description: SERDES PLL associated with the ROC has lost lock.
        values:
          0: "PLL locked"
          1: "PLL lock lost"
      - name: SERDES CDR Lock Lost
        bits: "12"
        size_bits: 1
        description: SERDES associated with the ROC has lost clock-data-recovery lock.
        values:
          0: "CDR locked"
          1: "CDR lock lost"
      - name: Invalid Packet Received
        bits: "13"
        size_bits: 1
        description: Invalid packet has been received from the ROC.
        values:
          0: "No error"
          1: "Invalid packet received from ROC"
      - name: DTC Data Handling Error
        bits: "14"
        size_bits: 1
        description: Error in DTC handling of this ROC's DATA requests has occurred.
        values:
          0: "No error"
          1: "DTC data handling error"

  - name: ROC Link ID
    bits: "10:8"
    word: 1
    size_bits: 3
    description: >
      Specifies the link on the parent DTC that the source ROC is located on.
      The DTC's six optical links are numbered 0 through 5.

  - name: Packet Type
    bits: "7:4"
    word: 1
    size_bits: 4
    description: Packet type identifier. Always 0x5 for a Data Header Packet.
    fixed_value: 0x5

  - name: Reserved (low nibble)
    bits: "3:0"
    word: 1
    size_bits: 4
    description: Reserved bits, should be zero.

  - name: Reserved (bits 12:11)
    bits: "12:11"
    word: 2
    size_bits: 2
    description: Reserved bits, should be zero.

  - name: Packet Count
    bits: "10:0"
    word: 2
    size_bits: 11
    description: >
      Count (0 to 2046) indicating the number of Data Payload Packets that
      follow this Data Header Packet. Maximum is 2046 (0x7FE) due to the
      8-byte DMA size header and the maximum DMA transfer size of 0x8000 bytes.

  - name: Subsystem ID
    bits: "15:13"
    word: 2
    size_bits: 3
    description: >
      3-bit field identifying the detector subsystem that produced this data.
    values:
      0x0: "Tracker"
      0x1: "Calorimeter"
      0x2: "CRV (Cosmic Ray Veto)"
      0x3: "Reserved"
      0x4: "STM (Stopping Target Monitor)"
      0x5: "ExtMon (External Monitor)"
      0x6: "Reserved"
      0x7: "TDAQ (Trigger and Data Acquisition)"

  - name: Event Window Tag byte 1
    bits: "15:8"
    word: 3
    size_bits: 8
    description: Byte 1 of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 0
    bits: "7:0"
    word: 3
    size_bits: 8
    description: Byte 0 (least significant byte) of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 3
    bits: "15:8"
    word: 4
    size_bits: 8
    description: Byte 3 of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 2
    bits: "7:0"
    word: 4
    size_bits: 8
    description: Byte 2 of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 5
    bits: "15:8"
    word: 5
    size_bits: 8
    description: Byte 5 (most significant byte) of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 4
    bits: "7:0"
    word: 5
    size_bits: 8
    description: Byte 4 of the 48-bit Event Window Tag.

  - name: Data Packet Format Version
    bits: "15:8"
    word: 6
    size_bits: 8
    description: >
      8-bit format version number. Intended as a persistent mapping to a
      particular packet type for the duration of the experiment, enabling data
      decoding even if packet definitions change in the future.

  - name: Status
    bits: "7:0"
    word: 6
    size_bits: 8
    description: >
      8-bit status field containing flags set by the ROC FPGA.
    subfields:
      - name: Event Window Has Data
        bits: "0"
        size_bits: 1
        description: >
          When set (1), indicates detector data is present for this event window.
          When clear (0), indicates no data for the event window.
        values:
          0: "No data present for this Event Window"
          1: "Detector data present for this Event Window"
      - name: Invalid Event Window Request
        bits: "1"
        size_bits: 1
        description: >
          When set (1), indicates the ROC did not receive a Heartbeat packet
          corresponding to this Data Request (the event window was not
          previously announced).
        values:
          0: "Valid event window request (Heartbeat was received)"
          1: "Invalid: no Heartbeat received for this Event Window"
      - name: I Am Corrupt
        bits: "2"
        size_bits: 1
        description: >
          When set (1), indicates the ROC has lost data or the ability to
          conduct detector readout has been compromised.
        values:
          0: "ROC readout is healthy"
          1: "ROC has lost data or readout is compromised"
      - name: Timeout
        bits: "3"
        size_bits: 1
        description: >
          When set (1), indicates ROC retrieval of data did not respond before
          a timeout occurred.
        values:
          0: "No timeout"
          1: "Data retrieval timed out"
      - name: Overflow
        bits: "4"
        size_bits: 1
        description: >
          When set (1), indicates data is good but not all data could be sent
          (buffer overflow occurred).
        values:
          0: "No overflow"
          1: "Data overflow: some data could not be sent"
      - name: Reserved
        bits: "7:5"
        size_bits: 3
        description: Reserved status bits, should be zero.

  - name: Event Mode
    bits: "15:11"
    word: 7
    size_bits: 5
    description: >
      5-bit Event Mode field from the Heartbeat Packet for this event window.
      Mirrors the relevant event mode bits from the corresponding Heartbeat.

  - name: Subrun Handling
    bits: "10:9"
    word: 7
    size_bits: 2
    description: >
      2-bit subrun handling field. One approach designates one bit for current
      subrun odd/even state and one bit as a predictive bit for a future subrun
      transition. The predictive bit gives software time to prepare; the current
      bit verifies the event lands in the correct subrun.

  - name: On-spill
    bits: "8"
    word: 7
    size_bits: 1
    description: >
      Single bit flag indicating whether this event window is on-spill (1)
      or off-spill (0). Mirrors the On-spill Flag from the Heartbeat Packet.
    values:
      0: "Off-spill event window"
      1: "On-spill event window"

  - name: DTC ID
    bits: "7:0"
    word: 7
    size_bits: 8
    description: >
      8-bit DTC identifier. Same value as 'DTC Source DTC ID' in the
      Subevent Header. Identifies the specific DTC module that received
      this ROC's data.

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: >
      16-bit CRC for error detection. High byte in word 8 bits [15:8],
      low byte in word 8 bits [7:0].
