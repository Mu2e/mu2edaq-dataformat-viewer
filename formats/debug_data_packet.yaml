name: Debug Data Packet
description: >
  Debug Data Packet sent by the ROC following a Debug Header Packet, in
  response to a debug Data Request. Used for DAQ system testing.

  When the Debug Type is 0x1 (External Serial Data) or 0x2 (External Serial
  Data with Initial Reset of FIFO), each packet contains 4 pairs of 16-bit
  words: alternating Info Blocks and Data Blocks. Odd-numbered blocks (Data 1,
  3, 5, 7) carry deserialized 16-bit words from the FIFO buffer. Even-numbered
  blocks (Data 0, 2, 4, 6) carry 16-bit Info Blocks with FIFO metadata.

  The number of Debug Data Packets is specified by the Packet Count field in
  the preceding Debug Header Packet.
packet_type: 0x6
size_bytes: 16
dma_channel: 0
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D6.y) prepended on
    transmission and stripped on receipt.
  k_char: K28.0
  d_char: D6.y

fields:
  - name: Debug Data 0 - Info Block
    bits: "15:0"
    word: 0
    size_bits: 16
    description: >
      16-bit Info Block for data entry 0. Contains FIFO status metadata.
      See Info Block format below.

  - name: Debug Data 1 - Deserialized Data
    bits: "15:0"
    word: 1
    size_bits: 16
    description: >
      16-bit deserialized data word 0 from the FIFO buffer. If the
      dbgSerialFifo_empty flag is set in the preceding Info Block (Data 0),
      then this word's contents are identical to the previous data block.

  - name: Debug Data 2 - Info Block
    bits: "15:0"
    word: 2
    size_bits: 16
    description: >
      16-bit Info Block for data entry 2. Contains FIFO status metadata.

  - name: Debug Data 3 - Deserialized Data
    bits: "15:0"
    word: 3
    size_bits: 16
    description: >
      16-bit deserialized data word 1 from the FIFO buffer.

  - name: Debug Data 4 - Info Block
    bits: "15:0"
    word: 4
    size_bits: 16
    description: >
      16-bit Info Block for data entry 4. Contains FIFO status metadata.

  - name: Debug Data 5 - Deserialized Data
    bits: "15:0"
    word: 5
    size_bits: 16
    description: >
      16-bit deserialized data word 2 from the FIFO buffer.

  - name: Debug Data 6 - Info Block
    bits: "15:0"
    word: 6
    size_bits: 16
    description: >
      16-bit Info Block for data entry 6. Contains FIFO status metadata.

  - name: Debug Data 7 - Deserialized Data
    bits: "15:0"
    word: 7
    size_bits: 16
    description: >
      16-bit deserialized data word 3 from the FIFO buffer.

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: 16-bit CRC for error detection.

info_block_format:
  name: 16-Bit Info Block Format
  description: >
    Format of each even-numbered 16-bit data block (Data 0, 2, 4, 6, ...).
    Contains FIFO occupancy count and full/empty status flags.
  fields:
    - name: Reserved (bits 15:14)
      bits: "15:14"
      size_bits: 2
      description: Always 0b00.
      fixed_value: 0b00

    - name: dbgSerialFifo_full (Y)
      bits: "13"
      size_bits: 1
      description: >
        1-bit flag (Y) indicating whether the FIFO buffer is FULL.
      values:
        0: "FIFO is not full"
        1: "FIFO is full"

    - name: dbgSerialFifo_empty (X)
      bits: "12"
      size_bits: 1
      description: >
        1-bit flag (X) indicating whether the FIFO buffer is EMPTY.
        If this flag is set, the contents of the next (odd-numbered) 16-bit
        data block will be identical to the previous data block.
      values:
        0: "FIFO is not empty"
        1: "FIFO is empty (next data block repeats previous value)"

    - name: Reserved (bit 11)
      bits: "11"
      size_bits: 1
      description: Always 0b0.
      fixed_value: 0b0

    - name: FIFO Count
      bits: "10:0"
      size_bits: 11
      description: >
        11-bit count of the number of entries currently in the FIFO buffer
        at the time this info block was captured.

notes: >
  - Even-indexed data blocks (0, 2, 4, 6, ...) are Info Blocks with FIFO metadata.
  - Odd-indexed data blocks (1, 3, 5, 7, ...) are 16-bit deserialized FIFO data words.
  - If the dbgSerialFifo_empty (X) flag is set in an Info Block, the subsequent
    data block contains the same value as the previous data block (FIFO underflow).
  - This format applies when Debug Type is 0x1 or 0x2 (External Serial Data).
  - Additional debug data packet formats may be defined in the future as needed.
