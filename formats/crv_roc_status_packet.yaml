name: CRV ROC Status Packet
description: >
  The first Data Payload Packet in a Cosmic Ray Veto (CRV) data block, immediately
  following the Data Header Packet. Unlike other subsystems, the CRV is only read
  out upon a pull request based on the output of Tracker and Calorimeter filters.
  When a pull request is received, all hits for the event are read out at once,
  ROC by ROC. Each CRV DataBlock contains all hits from a single ROC.

  The CRV ROC Status Packet carries the Controller ID, active FEB (Front-End Board)
  channel flags, trigger count, and event window tag information.

  Note: There is a difference between the default firmware (used e.g. for VST) and
  the Global Run firmware. The last three words differ:
    - Default firmware: Microbunch Status (1 word) + Event Window Tag (2 words,
      highest word first).
    - Global Run firmware: Event Window Tag (3 words, lowest word first).
subsystem_id: 0x2
subsystem_name: CRV (Cosmic Ray Veto)
packet_type: 0x6
size_bytes: 16
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D6.y) prepended on
    transmission and stripped on receipt.
  k_char: K28.0
  d_char: D6.y

fields:
  - name: CRV Packet Type
    bits: "15:12"
    word: 0
    size_bits: 4
    description: >
      4-bit CRV-internal packet type identifier within the CRV data block.
      Set to 0x6 to identify this as a CRV ROC Status Packet.
    fixed_value: 0x6

  - name: Controller ID
    bits: "11:4"
    word: 0
    size_bits: 8
    description: >
      8-bit controller (ROC) identifier. Uniquely identifies this CRV ROC within
      the CRV subsystem.

  - name: Reserved (word 0 low 4 bits)
    bits: "3:0"
    word: 0
    size_bits: 4
    description: Reserved bits, should be zero.

  - name: Controller Event Word Count
    bits: "15:0"
    word: 1
    size_bits: 16
    description: >
      16-bit count of the total number of 16-bit words in the event data
      produced by this controller (ROC) for this event window.

  - name: Reserved (word 2)
    bits: "15:0"
    word: 2
    size_bits: 16
    description: Reserved word, should be zero.

  - name: Active FEB Flags Byte 2
    bits: "15:8"
    word: 3
    size_bits: 8
    description: >
      Byte 2 (bits 23:16) of the 24-bit Active FEB Flags field. Each bit
      indicates whether the corresponding FEB channel is connected to this
      controller. Since not every controller will read out 24 FEBs, this
      mask identifies active FEB channels.
      Bit 23 = FEB channel 23, Bit 16 = FEB channel 16.

  - name: Active FEB Flags Byte 1
    bits: "7:0"
    word: 3
    size_bits: 8
    description: >
      Byte 1 (bits 15:8) of the 24-bit Active FEB Flags field.
      Bit 15 = FEB channel 15, Bit 8 = FEB channel 8.

  - name: Active FEB Flags Byte 0
    bits: "15:8"
    word: 4
    size_bits: 8
    description: >
      Byte 0 (bits 7:0) of the 24-bit Active FEB Flags field.
      Bit 7 = FEB channel 7, Bit 0 = FEB channel 0.

  - name: Trigger Count (high byte)
    bits: "7:0"
    word: 4
    size_bits: 8
    description: High byte of the 16-bit Trigger Count.

  - name: Trigger Count (low byte)
    bits: "15:8"
    word: 5
    size_bits: 8
    description: >
      Low byte of the 16-bit Trigger Count. The Trigger Count is incremented
      once for each Data Request Packet received by this ROC. Reset each supercycle.

  - name: Microbunch Status / Event Window Tag word 0
    bits: "7:0"
    word: 5
    size_bits: 8
    description: >
      Default firmware: Microbunch Status (1 word = 8 bits shown here,
      full word is 16 bits spanning words 5 low byte and word 6 high byte).
      Global Run firmware: Low byte of Event Window Tag word 0 (lowest EWT word).

  - name: Event Window Tag 1 / Event Window Tag 1
    bits: "15:0"
    word: 6
    size_bits: 16
    description: >
      Default firmware: Event Window Tag byte 1 (second EWT word, highest first).
      Global Run firmware: Event Window Tag word 1 (middle EWT word, lowest first).

  - name: Event Window Tag 0 / Event Window Tag 2
    bits: "15:0"
    word: 7
    size_bits: 16
    description: >
      Default firmware: Event Window Tag byte 0 (lowest EWT word).
      Global Run firmware: Event Window Tag word 2 (highest EWT word).

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: 16-bit CRC for error detection.

notes: >
  The 24-bit Active FEB Flags field uses one bit per possible FEB channel (0-23)
  to indicate whether that FEB is connected to this CRV ROC. This allows the
  downstream software to know how many hit records to expect.

  Two firmware variants exist with different encodings for the last 3 words:
    - Default firmware (VST and standard): Words 5-7 carry Microbunch Status
      (16 bits) then Event Window Tag (32 bits, highest-word-first order).
    - Global Run firmware: Words 5-7 carry all 3 Event Window Tag words in
      lowest-word-first order (no Microbunch Status).
