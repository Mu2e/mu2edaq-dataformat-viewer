name: STM Slice Header Packet
description: >
  Slice Header packet used by the Stopping Target Monitor (STM) subsystem.
  Each STM trigger event contains one or more slices. Each slice consists of
  a Slice Header followed by N 16-bit ADC samples, where N is determined from
  the Slice Size field in this header.

  In the test beam data processed in Offline, there is typically only one slice
  per trigger, and each slice represents an unsuppressed waveform.

  The Slice Header is exactly 8 words (16 bytes).
subsystem_id: 0x4
subsystem_name: STM (Stopping Target Monitor)
packet_type: 0x6
size_bytes: 16

fields:
  - name: Slice Number (high 16 bits)
    bits: "15:0"
    word: 0
    size_bits: 16
    description: >
      High 16 bits of the 32-bit slice number. Identifies which slice within
      this trigger this header describes (0-indexed).

  - name: Slice Number (low 16 bits)
    bits: "15:0"
    word: 1
    size_bits: 16
    description: >
      Low 16 bits of the 32-bit slice number.

  - name: Slice Size (high 16 bits)
    bits: "15:0"
    word: 2
    size_bits: 16
    description: >
      High 16 bits of the 32-bit slice size. The slice size represents the
      total byte count of the ADC values following this Slice Header. The
      number of ADC samples is: slice_size / 2 (since each sample is 16 bits).

  - name: Slice Size (low 16 bits)
    bits: "15:0"
    word: 3
    size_bits: 16
    description: >
      Low 16 bits of the 32-bit slice size.

  - name: Slice Time (word 1, highest 16 bits)
    bits: "15:0"
    word: 4
    size_bits: 16
    description: >
      Bits [63:48] of the 64-bit slice timestamp. Defines the time of this
      slice within the event.

  - name: Slice Time (word 2)
    bits: "15:0"
    word: 5
    size_bits: 16
    description: >
      Bits [47:32] of the 64-bit slice timestamp.

  - name: Slice Time (word 3)
    bits: "15:0"
    word: 6
    size_bits: 16
    description: >
      Bits [31:16] of the 64-bit slice timestamp.

  - name: Slice Time (word 4, lowest 16 bits)
    bits: "15:0"
    word: 7
    size_bits: 16
    description: >
      Bits [15:0] of the 64-bit slice timestamp.

notes: >
  - The Slice Header is followed immediately by N 16-bit ADC samples.
  - N = Slice Size / 2 (Slice Size is in bytes, each ADC sample is 16 bits = 2 bytes).
  - After all N ADC samples, the next Slice Header follows (if Number of Slices > 1),
    or the next Trigger Header follows.
  - The 64-bit Slice Time gives the absolute timestamp for the start of this slice.
  - See stm_trigger_header_packet.yaml for the overall structure.
