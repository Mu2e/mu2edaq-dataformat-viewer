name: CRV Hit Data Packet
description: >
  Data payload format for individual CRV (Cosmic Ray Veto) hits, used in the
  default firmware. Immediately following the CRV ROC Status Packet are as
  many Data Payload Packets as necessary to contain all hit readouts recorded
  by the ROC. Each hit requires exactly 10 x 16-bit words (20 bytes), which
  may span packet boundaries.

  Each hit carries the ROC ID, ROC Port, FEB Channel, Hit Time, number of
  waveform samples, and 8 waveform sample values (each 12-bit).

  Note: This hit format is expected to change for the new firmware of the
  CRV FEB-II.
subsystem_id: 0x2
subsystem_name: CRV (Cosmic Ray Veto)
packet_type: 0x6
words_per_hit: 10
bytes_per_hit: 20
firmware_variant: default

hit_format:
  description: >
    Each hit is 10 x 16-bit words. Multiple hits may be packed into the
    8-word payload of a single Data Payload Packet, or a single hit may
    span two packets.

  fields:
    - name: ROC ID
      bits: "15:11"
      word: 0
      size_bits: 5
      description: >
        5-bit ROC (Readout Controller) identifier that produced this hit.

    - name: ROC Port
      bits: "10:6"
      word: 0
      size_bits: 5
      description: >
        5-bit ROC port number identifying which FEB connection port on the
        ROC this hit came from.

    - name: FEB Channel
      bits: "5:0"
      word: 0
      size_bits: 6
      description: >
        6-bit Front-End Board channel number that detected this hit.
        Range: 0 to 63.

    - name: Number of Samples
      bits: "15:12"
      word: 1
      size_bits: 4
      description: >
        4-bit field indicating the number of waveform samples contained in
        this hit record.

    - name: Hit Time
      bits: "11:0"
      word: 1
      size_bits: 12
      description: >
        12-bit hit timestamp. Represents the time of the hit within the
        event window.

    - name: Unused (word 2)
      bits: "15:12"
      word: 2
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 0
      bits: "11:0"
      word: 2
      size_bits: 12
      description: First 12-bit waveform sample value.

    - name: Unused (word 3 high)
      bits: "15:12"
      word: 3
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 1
      bits: "11:0"
      word: 3
      size_bits: 12
      description: Second 12-bit waveform sample value.

    - name: Unused (word 4 high)
      bits: "15:12"
      word: 4
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 2
      bits: "11:0"
      word: 4
      size_bits: 12
      description: Third 12-bit waveform sample value.

    - name: Unused (word 5 high)
      bits: "15:12"
      word: 5
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 3
      bits: "11:0"
      word: 5
      size_bits: 12
      description: Fourth 12-bit waveform sample value.

    - name: Unused (word 6 high)
      bits: "15:12"
      word: 6
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 4
      bits: "11:0"
      word: 6
      size_bits: 12
      description: Fifth 12-bit waveform sample value.

    - name: Unused (word 7 high)
      bits: "15:12"
      word: 7
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 5
      bits: "11:0"
      word: 7
      size_bits: 12
      description: Sixth 12-bit waveform sample value.

    - name: Unused (word 8 high)
      bits: "15:12"
      word: 8
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 6
      bits: "11:0"
      word: 8
      size_bits: 12
      description: Seventh 12-bit waveform sample value.

    - name: Unused (word 9 high)
      bits: "15:12"
      word: 9
      size_bits: 4
      description: Unused field.

    - name: Waveform Sample 7
      bits: "11:0"
      word: 9
      size_bits: 12
      description: Eighth 12-bit waveform sample value.

notes: >
  - This format is for the default CRV firmware. The CRV FEB-II firmware
    will use a different hit format.
  - Each hit is exactly 10 words (20 bytes). Multiple hits are packed
    back-to-back within the Data Payload Packets following the CRV ROC Status
    Packet.
  - Waveform samples are 12-bit values stored in the low 12 bits of each word,
    with the top 4 bits unused (set to zero).
  - The number of hits can be inferred from the Packet Count in the Data Header
    and the Controller Event Word Count in the CRV ROC Status Packet.
