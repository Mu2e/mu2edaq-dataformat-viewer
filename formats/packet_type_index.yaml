name: Mu2e ROC Packet Protocol - Packet Type Index
description: >
  Index of all packet types defined in the Mu2e Readout Controller (ROC)
  Packet Protocol (Mu2e-doc-4914). Defines the data exchange protocol between
  ROCs and the Trigger and Data Acquisition (TDAQ) firmware/software via the
  Data Transfer Controller (DTC).

  Each packet has a 4-bit Packet Type field. Packets are 16 bytes each.
  Each packet is preceded by a 2-byte serial header (K28.0 + Dx.y) generated
  by hardware on transmission and stripped by hardware on receipt. The Dx.y
  byte encodes the packet type (T=0) or marker (T=1) in bit 4, and the
  sequence number (0-7, incrementing, wrapping) in bits [2:0].

document_reference: Mu2e-doc-4914
last_updated: "21 February 2026"
maintained_by:
  - Ryan Rivera
  - Eric Flumerfelt
  - Rick Kwarciany
  - Ron Rechenmacher

related_documents:
  - "Mu2e-doc-5619: CFO (Command Fan-Out) User Guide"
  - "Mu2e-doc-4907: DTC (Data Transfer Controller) User Guide"
  - "Mu2e-doc-4097: DTC Documentation (packet templates)"
  - "Mu2e-doc-3965: DCS Documentation"
  - "Mu2e-doc-22861: TDAQ Error Handling and Accounting Plans"

dma_channels:
  channel_0:
    description: >
      Readout Request, Data Request (Prefetch and normal), Data Header, and
      Data Payload packets. Also carries Heartbeat (broadcast) packets.
  channel_1:
    description: >
      Detector Control System (DCS) Request and Reply packets.

packet_types:
  - packet_type: 0x0
    name: DCS Request
    direction: DTC -> ROC
    dma_channel: 1
    serial_d_char: D0.y
    yaml_file: dcs_request_packet.yaml

  - packet_type: 0x1
    name: Heartbeat (broadcast)
    direction: CFO -> DTC -> ROC (broadcast)
    dma_channel: 0
    serial_d_char: D1.y
    yaml_file: heartbeat_packet.yaml

  - packet_type: 0x2
    name: Data Request
    direction: DTC -> ROC
    dma_channel: 0
    serial_d_char: D2.y
    yaml_file: data_request_packet.yaml

  - packet_type: 0x3
    name: Prefetch Request
    direction: DTC -> ROC
    dma_channel: 0
    serial_d_char: D3.y
    yaml_file: prefetch_request_packet.yaml

  - packet_type: 0x4
    name: DCS Reply
    direction: ROC -> DTC
    dma_channel: 1
    serial_d_char: D4.y
    yaml_file: dcs_reply_packet.yaml

  - packet_type: 0x5
    name: Data Header
    direction: ROC -> DTC
    dma_channel: 0
    serial_d_char: D5.y
    yaml_file: data_header_packet.yaml
    notes: >
      Also used by Debug Header Packets (same packet type code, different payload).

  - packet_type: 0x6
    name: Data Payload
    direction: ROC -> DTC
    dma_channel: 0
    serial_d_char: D6.y
    yaml_file: data_payload_packet.yaml
    subsystem_specific_formats:
      - yaml_file: tracker_data_packet.yaml
        subsystem: Tracker (Subsystem ID 0x0)
      - yaml_file: calorimeter_hit_data_packet.yaml
        subsystem: Calorimeter Hit Data (Subsystem ID 0x1)
      - yaml_file: calorimeter_hit_debugging_data_packet.yaml
        subsystem: Calorimeter Debug Data (Subsystem ID 0x1)
      - yaml_file: calorimeter_footer_packet.yaml
        subsystem: Calorimeter Footer (Subsystem ID 0x1)
      - yaml_file: crv_roc_status_packet.yaml
        subsystem: CRV ROC Status (Subsystem ID 0x2)
      - yaml_file: crv_hit_data_packet.yaml
        subsystem: CRV Hit Data (Subsystem ID 0x2)
      - yaml_file: crv_global_run_info_packet.yaml
        subsystem: CRV Global Run Info (Subsystem ID 0x2)
      - yaml_file: stm_trigger_header_packet.yaml
        subsystem: STM Trigger Header (Subsystem ID 0x4)
      - yaml_file: stm_slice_header_packet.yaml
        subsystem: STM Slice Header (Subsystem ID 0x4)
      - yaml_file: debug_data_packet.yaml
        subsystem: Debug Data (any subsystem)

  - packet_type: 0x7
    name: DCS Additional Block Write Payload
    direction: DTC -> ROC
    dma_channel: 1
    serial_d_char: D7.y
    yaml_file: dcs_request_additional_block_write_payload_packet.yaml

  - packet_type: 0x8
    name: DCS Reply Additional Block Read Payload
    direction: ROC -> DTC
    dma_channel: 1
    serial_d_char: D8.y
    yaml_file: dcs_reply_additional_block_read_payload_packet.yaml

  - packet_type: 0x9
    name: Reserved
    description: Reserved, not used.

  - packet_types: "0xA-0xF"
    name: Reserved for Special Marker Characters
    description: >
      Reserved for use by Special Marker Characters transmitted on the
      DTC-to-ROC serial link. These are not standard data packets but
      8B10B encoded characters used for timing and control.

subsystem_ids:
  0x0: "Tracker"
  0x1: "Calorimeter"
  0x2: "CRV (Cosmic Ray Veto)"
  0x3: "Reserved"
  0x4: "STM (Stopping Target Monitor)"
  0x5: "ExtMon (External Monitor)"
  0x6: "Reserved"
  0x7: "TDAQ (Trigger and Data Acquisition)"

special_marker_characters:
  description: >
    Special marker characters transmitted on the serial link as 18-bit
    8B10B encoded character pairs. Markers are transmitted in complementary
    pairs (e.g., K and Kn) for robustness against single-character errors.
    Markers have the highest priority on the link, above DCS and Data packets.
    T=1 (bit 4 of the Dx byte) identifies a marker vs. T=0 for packets.
  markers:
    - name: EventStartK
      value: "18'h21C10"
      encoding: "K28.0 D16.0"
      description: Event start marker (first of complementary pair).

    - name: EventStartKn
      value: "18'h21CEF"
      encoding: "K28.0 D15.7"
      description: Event start marker complement (second of pair).

    - name: Clock40MHzMarkerK
      value: "18'h21C11"
      encoding: "K28.0 D17.0"
      description: 40 MHz clock marker (first of complementary pair).

    - name: Clock40MHzMarkerKn
      value: "18'h21CEE"
      encoding: "K28.0 D14.7"
      description: 40 MHz clock marker complement (second of pair).

    - name: LoopbackMarkerK
      value: "18'h21C12"
      encoding: "K28.0 D18.0"
      description: Loopback delay-measure marker. Single character (no complement pair).

    - name: LoopbackMarkerKn
      value: "18'h21CED"
      encoding: "K28.0 D13.7"
      description: Negative loopback marker.

    - name: LoopbackMarkerReplyK
      value: "18'h21C9x"
      encoding: "K28.0 1001_xxxx (x is ROC src)"
      description: Loopback marker reply. The lower 4 bits encode the ROC source.

    - name: DiagnosticK
      value: "18'h21C13"
      encoding: "K28.0 D19.0"
      description: Diagnostic marker. Single character (no complement pair).

    - name: DCSTimeoutK
      value: "18'h21C14"
      encoding: "K28.0 D20.0"
      description: DCS timeout marker. Single character (no complement pair).

    - name: RetransK
      value: "18'h21C15"
      encoding: "K28.0 D21.0"
      description: >
        Retransmit marker (first of complementary pair). Sent by the DTC
        when a packet error is detected, requesting the ROC to retransmit
        starting from the last good packet. Followed immediately by a 16-bit
        data word with the sequence number repeated in each nibble
        (e.g., for sequence 3: 0x3333).

    - name: RetransKn
      value: "18'h21CEA"
      encoding: "K28.0 D10.7"
      description: Retransmit marker complement (second of pair).

packet_sequence_numbers:
  description: >
    Each packet type transmitted on either the data or CFO links has a unique
    2-byte serial header generated by hardware. The header consists of K28.0
    and a Dx.y character where Dx encodes the packet type and y is the sequence
    number. Sequence numbers reset to zero on system reset and increment by one
    with each successive packet (wrapping from 7 back to 0). Each ROC, DTC, and
    CFO module generates sequence numbers on all packets. Receiving devices must
    check sequence numbers and flag errors for out-of-sequence packets.
    Incoming and outgoing packet sequence numbers are completely uncorrelated.
  dx_y_bit_definition: "kk_0001_1100_sssT_tttt"
  fields:
    - name: kk
      description: k-character bits, always b10 for packets and markers
    - name: 0001_1110 (0x1C)
      description: Comma character for packets and markers
    - name: sss
      description: Sequence number (0-7, always incrementing)
    - name: T
      description: "Type bit: 0 = packet, 1 = marker"
    - name: tttt
      description: 4-bit sub-type (packet type or marker type)

error_handling:
  dtc_to_roc:
    description: >
      Markers are made robust by transmitting complementary pairs. If a ROC
      recovers only one character of a marker pair, it should flag the error
      and generate a DCS packet with the error condition. Missing packets are
      detected via sequence number gaps. Corrupt packets are identified by
      CRC errors or unexpected packet contents.
    roc_actions_on_packet_error:
      - "Discard the bad packet and all subsequent associated data packets"
      - "Abort any operations started by the packet"
      - "Flag and count the error (separate counters for missing vs corrupt recommended)"
    note: "No retransmission is supported DTC-to-ROC."

  roc_to_dtc:
    description: >
      The DTC supports a retransmission mechanism for ROC-to-DTC packets.
      A Packet Error is any packet with a CRC error or bad sequence number.
    dtc_actions_on_packet_error:
      - "Discard the bad packet and all subsequent sequential data packets until replacement received or 7 out-of-sequence packets received or timeout"
      - "Flag and count the error"
      - "Generate a Retransmit Marker (0x1C15 + 0x1CEA) followed by a 16-bit word with the sequence number of the last good packet repeated in each nibble (e.g., seq 3 -> 0x3333)"
    retransmission_success: >
      If a successful retransmission is received, the DTC propagates the
      retransmitted in-sequence packets.
    retransmission_failure: >
      If 7 subsequent out-of-sequence packets are received or timeout passes,
      the DTC resets the expected sequence number to allow communication to continue.
    roc_retransmit_preparation: >
      Before retransmitting, the ROC must insert at least 8 comma characters
      as an assertion that the retransmission request was received.
