name: STM Trigger Header Packet
description: >
  Trigger Header packet used by the Stopping Target Monitor (STM) subsystem,
  defined for data collected at the ELBE test beam and used to develop
  otsdaq/artdaq software for the STM VST. The overall data structure is:
  Trigger Header #1, Slice Header #1, ADC Samples, ..., Slice Header #N,
  ADC Samples, Trigger Header #2, Slice Header #1, ADC Samples, ...etc.
  In test beam data, there is typically one slice per trigger, each representing
  an unsuppressed waveform.

  The Trigger Header is 20 words (40 bytes) when the Unix timestamp is included
  (run 101014 onwards), or 16 words (32 bytes) without the timestamp.
  All multi-byte fields are stored as pairs of 16-bit words (big-endian within
  the pair for 32-bit fields, or four words for 64-bit fields).

  Note: This packet definition is expected to be updated.
subsystem_id: 0x4
subsystem_name: STM (Stopping Target Monitor)
packet_type: 0x6
size_bytes_without_timestamp: 32
size_bytes_with_timestamp: 40

fields:
  - name: Fixed Header Word 1
    bits: "15:0"
    word: 0
    size_bits: 16
    description: >
      High 16 bits of the 32-bit fixed header value 0xDEADBEEF.
      Together with word 1, forms the magic number used to identify
      the start of a trigger header.
    fixed_value: 0xDEAD

  - name: Fixed Header Word 2
    bits: "15:0"
    word: 1
    size_bits: 16
    description: >
      Low 16 bits of the 32-bit fixed header value 0xDEADBEEF.
    fixed_value: 0xBEEF

  - name: Data Size (high 16 bits)
    bits: "15:0"
    word: 2
    size_bits: 16
    description: >
      High 16 bits of the 32-bit data size field. The data size represents
      the total size (in bytes) of all data in this trigger (all slices combined).

  - name: Data Size (low 16 bits)
    bits: "15:0"
    word: 3
    size_bits: 16
    description: >
      Low 16 bits of the 32-bit data size field.

  - name: Number of Slices (high 16 bits)
    bits: "15:0"
    word: 4
    size_bits: 16
    description: >
      High 16 bits of the 32-bit number of slices. Specifies how many
      Slice Headers (and their corresponding ADC sample blocks) follow
      this Trigger Header.

  - name: Number of Slices (low 16 bits)
    bits: "15:0"
    word: 5
    size_bits: 16
    description: >
      Low 16 bits of the 32-bit number of slices.

  - name: Trigger Number (high 16 bits)
    bits: "15:0"
    word: 6
    size_bits: 16
    description: >
      High 16 bits of the 32-bit trigger number. Used as the art::Event
      number in the Offline software framework.

  - name: Trigger Number (low 16 bits)
    bits: "15:0"
    word: 7
    size_bits: 16
    description: >
      Low 16 bits of the 32-bit trigger number.

  - name: Trigger Mode
    bits: "15:0"
    word: 8
    size_bits: 16
    description: >
      16-bit trigger mode field. Indicates whether the trigger was
      "internal" or "external".
    values:
      # Exact numeric values not specified in document; enum defined in
      # DataProducts/inc/STMTestBeamEventInfo.hh as STMTestBeamEventInfo::TriggerType
      0: "Internal trigger"
      1: "External trigger"

  - name: Trigger Time (word 1, highest 16 bits)
    bits: "15:0"
    word: 9
    size_bits: 16
    description: >
      Bits [63:48] of the 64-bit trigger timestamp.

  - name: Trigger Time (word 2)
    bits: "15:0"
    word: 10
    size_bits: 16
    description: >
      Bits [47:32] of the 64-bit trigger timestamp.

  - name: Trigger Time (word 3)
    bits: "15:0"
    word: 11
    size_bits: 16
    description: >
      Bits [31:16] of the 64-bit trigger timestamp.

  - name: Trigger Time (word 4, lowest 16 bits)
    bits: "15:0"
    word: 12
    size_bits: 16
    description: >
      Bits [15:0] of the 64-bit trigger timestamp.

  - name: Trigger Time Offset (high 16 bits)
    bits: "15:0"
    word: 13
    size_bits: 16
    description: >
      High 16 bits of the 32-bit trigger time offset. The offset is measured
      in clock ticks between the trigger time and the first ADC sample.

  - name: Trigger Time Offset (low 16 bits)
    bits: "15:0"
    word: 14
    size_bits: 16
    description: >
      Low 16 bits of the 32-bit trigger time offset.

  - name: Number of Dropped Packets
    bits: "15:0"
    word: 15
    size_bits: 16
    description: >
      16-bit count of the number of dropped packets for this trigger event.

  - name: Unix Timestamp (word 1, highest 16 bits)
    bits: "15:0"
    word: 16
    size_bits: 16
    description: >
      Bits [63:48] of the 64-bit Unix timestamp. Added to the trigger header
      from run 101014 onwards. Not present in earlier runs.

  - name: Unix Timestamp (word 2)
    bits: "15:0"
    word: 17
    size_bits: 16
    description: >
      Bits [47:32] of the 64-bit Unix timestamp.

  - name: Unix Timestamp (word 3)
    bits: "15:0"
    word: 18
    size_bits: 16
    description: >
      Bits [31:16] of the 64-bit Unix timestamp.

  - name: Unix Timestamp (word 4, lowest 16 bits)
    bits: "15:0"
    word: 19
    size_bits: 16
    description: >
      Bits [15:0] of the 64-bit Unix timestamp.

notes: >
  - The 32-bit fixed header 0xDEADBEEF identifies the start of each trigger header.
  - The 32-bit data size is the total byte count of all data in this trigger.
  - The 32-bit number of slices tells how many (Slice Header + ADC Samples) blocks follow.
  - The 32-bit trigger number maps to the art::Event number in Offline software.
  - The 16-bit trigger mode uses the STMTestBeamEventInfo::TriggerType enum
    (defined in DataProducts/inc/STMTestBeamEventInfo.hh).
  - The 32-bit trigger time offset is in clock ticks from the trigger time to the
    first ADC sample.
  - The 64-bit Unix timestamp was added for run 101014 onwards; it is absent in
    earlier runs, making the header 16 words (32 bytes) instead of 20 words (40 bytes).
  - Offline software reads binary files of STM test beam data using
    Sources/src/FromSTMTestBeamData_module.cc with definitions in
    Sources/inc/STMTestBeamHeaders.hh.
