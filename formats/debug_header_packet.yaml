name: Debug Header Packet
description: >
  Debug Header packet generated by the ROC in response to a Data Request Packet
  with the Debug bit set to 1 and Debug Type set to 0x1 (External Serial Data)
  or 0x2 (External Serial Data with Initial Reset of FIFO). The debug mechanism
  is used to test the DAQ system by reading out an external serial FIFO buffer.

  The Debug Header Packet uses the same packet type as the Data Header Packet
  (0x5, D5.y) but with a distinct internal layout. It is followed by the
  number of Debug Data Packets indicated by the Packet Count field.

  The debug request specifies the number of debug data packets via the Debug
  Packet Count field in the Data Request Packet.
packet_type: 0x5
size_bytes: 16
dma_channel: 0
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D5.y) prepended on
    transmission and stripped on receipt. Same packet type byte as Data Header.
  k_char: K28.0
  d_char: D5.y

fields:
  - name: Reserved (word 0)
    bits: "15:0"
    word: 0
    size_bits: 16
    description: Reserved word, should be zero.

  - name: Valid
    bits: "15"
    word: 1
    size_bits: 1
    description: Valid flag. Used by the DTC DMA engine.

  - name: Reserved (bits 14:11)
    bits: "14:11"
    word: 1
    size_bits: 4
    description: Reserved bits, should be zero.

  - name: Subsystem ID
    bits: "10:8"
    word: 1
    size_bits: 3
    description: >
      3-bit subsystem identifier. Same encoding as in the Data Header Packet.
    values:
      0x0: "Tracker"
      0x1: "Calorimeter"
      0x2: "CRV (Cosmic Ray Veto)"
      0x3: "Reserved"
      0x4: "STM (Stopping Target Monitor)"
      0x5: "ExtMon (External Monitor)"
      0x6: "Reserved"
      0x7: "TDAQ (Trigger and Data Acquisition)"

  - name: Op Code (fixed pattern)
    bits: "7:3"
    word: 1
    size_bits: 5
    description: >
      Fixed 5-bit field, always 0b00000 (all zeros) in the Debug Header Packet.
    fixed_value: 0b00000

  - name: ROC Link ID
    bits: "3:0"
    word: 1
    size_bits: 4
    description: >
      4-bit ROC Link ID identifying the link on the parent DTC for the
      source ROC.

  - name: Packet Count
    bits: "10:0"
    word: 2
    size_bits: 11
    description: >
      11-bit count of the number of Debug Data Packets that follow this
      Debug Header Packet.

  - name: Reserved (word 2 bits 15:11)
    bits: "15:11"
    word: 2
    size_bits: 5
    description: Reserved bits, should be zero.

  - name: Debug Type
    bits: "15:0"
    word: 3
    size_bits: 16
    description: >
      Debug type identifier. Indicates what kind of debug data follows.
    values:
      0x0: "Special Sequence"
      0x1: "External Serial Data"
      0x2: "External Serial Data With Initial Reset Of FIFO"
      0x3: "Reserved"

  - name: Timestamp byte 1
    bits: "15:8"
    word: 4
    size_bits: 8
    description: Byte 1 of the debug timestamp.

  - name: Timestamp byte 0
    bits: "7:0"
    word: 4
    size_bits: 8
    description: Byte 0 (least significant byte) of the debug timestamp.

  - name: Timestamp byte 3
    bits: "15:8"
    word: 5
    size_bits: 8
    description: Byte 3 of the debug timestamp.

  - name: Timestamp byte 2
    bits: "7:0"
    word: 5
    size_bits: 8
    description: Byte 2 of the debug timestamp.

  - name: Timestamp byte 5
    bits: "15:8"
    word: 6
    size_bits: 8
    description: Byte 5 (most significant byte) of the debug timestamp.

  - name: Timestamp byte 4
    bits: "7:0"
    word: 6
    size_bits: 8
    description: Byte 4 of the debug timestamp.

  - name: Fixed Pattern (0xA = 0b1010)
    bits: "15:12"
    word: 7
    size_bits: 4
    description: >
      Fixed 4-bit pattern, always 0xA (0b1010). Used as a recognizable
      constant in the debug header status word.
    fixed_value: 0xA

  - name: Reserved (bits 11:10)
    bits: "11:10"
    word: 7
    size_bits: 2
    description: Reserved bits, always 0b00.
    fixed_value: 0b00

  - name: dbgSerialFifo_full (Y)
    bits: "9"
    word: 7
    size_bits: 1
    description: >
      1-bit flag (labeled Y) indicating whether the FIFO buffer was FULL
      at the time of the readout.
    values:
      0: "FIFO was not full at time of readout"
      1: "FIFO was full at time of readout"

  - name: dbgSerialFifo_empty (X)
    bits: "8"
    word: 7
    size_bits: 1
    description: >
      1-bit flag (labeled X) indicating whether the FIFO buffer was EMPTY
      at the time of the readout.
    values:
      0: "FIFO was not empty at time of readout"
      1: "FIFO was empty at time of readout"

  - name: Status
    bits: "7:0"
    word: 7
    size_bits: 8
    description: >
      8-bit status field from the ROC debug FIFO readout.

  - name: Number of empty entries in buffer before readout
    bits: "15:8"
    word: 8
    size_bits: 8
    description: >
      8-bit count (dbgSerialFifo_emptyCnt) giving the number of empty
      entries in the FIFO queue at the time of readout.

  - name: Number of filled entries in buffer before readout
    bits: "7:0"
    word: 8
    size_bits: 8
    description: >
      8-bit count (dbgSerialFifo_fullCnt) giving the number of filled
      (occupied) entries in the FIFO queue at the time of readout.

  - name: CRC
    bits: "15:0"
    word: 9
    size_bits: 16
    description: 16-bit CRC for error detection.

notes: >
  The debug mechanism is used to read out an external serial FIFO buffer for
  DAQ system testing purposes.
  The X flag (dbgSerialFifo_empty) and Y flag (dbgSerialFifo_full) indicate
  FIFO state at the moment of readout. These are also replicated in each
  Debug Data Packet's 16-bit Info Block.
  The remainder of the packet beyond the filled fields is empty (zero).
