name: DCS Reply Packet
description: >
  Detector Control System (DCS) Reply packet sent from the ROC to the DTC
  on DMA channel 1. Generated in response to a DCS Request Packet. Carries
  read data for Read operations, acknowledgement for Write operations (when
  requested), and error/status information. DCS packets have priority over
  Data packets.
packet_type: 0x4
size_bytes: 16
dma_channel: 1
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D4.y) prepended on
    transmission and stripped on receipt. 'y' is the packet sequence number
    (0-7, incrementing, wrapping).
  k_char: K28.0
  d_char: D4.y

fields:
  - name: DMA Byte Count
    bits: "15:0"
    word: 0
    size_bits: 16
    description: >
      16-bit DMA byte count (high byte in bits 15:8, low byte in bits 7:0).
      Used by the DTC DMA engine.

  - name: Valid
    bits: "15"
    word: 1
    size_bits: 1
    description: Valid flag. Used by the DTC DMA engine.

  - name: DTC Errors
    bits: "14:11"
    word: 1
    size_bits: 4
    description: >
      4-bit field containing error flags identified at the DTC FPGA. These
      flags are inserted by the DTC before the packet is passed to software.
    subfields:
      - name: SERDES PLL Lock Lost
        bits: "11"
        size_bits: 1
        description: SERDES PLL associated with the ROC has lost lock.
        values:
          0: "PLL locked"
          1: "PLL lock lost"
      - name: SERDES CDR Lock Lost
        bits: "12"
        size_bits: 1
        description: SERDES associated with the ROC has lost clock-data-recovery lock.
        values:
          0: "CDR locked"
          1: "CDR lock lost"
      - name: Invalid Packet Received
        bits: "13"
        size_bits: 1
        description: Invalid packet has been received from the ROC.
        values:
          0: "No error"
          1: "Invalid packet received from ROC"
      - name: DTC DCS Handling Error
        bits: "14"
        size_bits: 1
        description: Error in DTC handling of this ROC's DCS requests has occurred.
        values:
          0: "No error"
          1: "DTC DCS handling error"

  - name: ROC Link ID
    bits: "10:8"
    word: 1
    size_bits: 3
    description: >
      Specifies the link on the parent DTC that the source ROC is located on.
      The DTC's six optical links are numbered 0 through 5.

  - name: Packet Type
    bits: "7:4"
    word: 1
    size_bits: 4
    description: Packet type identifier. Always 0x4 for a DCS Reply Packet.
    fixed_value: 0x4

  - name: Hop Count
    bits: "3:0"
    word: 1
    size_bits: 4
    description: 4-bit hop count from the originating DCS Request Packet.

  - name: Block Op Additional Packet Count
    bits: "15:6"
    word: 2
    size_bits: 10
    description: >
      For Block Read replies: number of DCS Reply Additional Block Read
      Payload packets following this packet. Non-zero when Block Op Word
      Count is greater than 3.
      For Block Write acknowledgements: mirrors the value from the request.

  - name: Status
    bits: "5:4"
    word: 2
    size_bits: 2
    description: >
      2-bit status field containing flags identified at the ROC FPGA.
    subfields:
      - name: DCS Request FIFO Empty
        bits: "4"
        size_bits: 1
        description: >
          When LOW (0), indicates there are more data requests queued in
          the ROC's DCS request FIFO.
        values:
          0: "More DCS requests are queued"
          1: "DCS request FIFO is empty"
      - name: I Am Corrupt
        bits: "5"
        size_bits: 1
        description: >
          When HIGH (1), indicates the ROC has lost DCS data or its ability
          to conduct DCS readout has been compromised.
        values:
          0: "ROC DCS readout is healthy"
          1: "ROC has lost DCS data or DCS readout is compromised"

  - name: Op Code
    bits: "3:0"
    word: 2
    size_bits: 4
    description: >
      4-bit Op Code field mirroring/describing the operation type.
      Several combinations are overloaded to carry error conditions.
    values:
      0x0: "Read(s) reply"
      0x1: "Write(s) reply"
      0x2: "Block Read reply"
      0x3: "Block Write reply (acknowledgement)"
      0x4: "Double Operation Read (not implemented by Tracker/Calorimeter)"
      0x5: "Double Operation Write (not implemented by Tracker/Calorimeter)"
      0x8: "Acknowledgement of Read(s)"
      0x9: "Acknowledgement of Write(s)"
      0xA: "Acknowledgement of Block Read"
      0xB: "Acknowledgement of Block Write"
      0xC: "DTC Identified Invalid Software-to-Chip DCS Request"
      0xE: "DTC Identified ROC Timeout"
      0xF: "Reserved for software use as Unknown"

  - name: Op1 Address
    bits: "15:0"
    word: 3
    size_bits: 16
    description: >
      Address for operation 1 (mirrored from request). For Block Read replies,
      this is the starting address.

  - name: Op1 Read Data / Block Op Word Count
    bits: "15:0"
    word: 4
    size_bits: 16
    description: >
      For Read and Double Read: read data returned for operation 1.
      For Block Read and Block Write (ack): the number of 16-bit words
      associated with the operation.

  - name: Op2 Address / Block Read Data0
    bits: "15:0"
    word: 5
    size_bits: 16
    description: >
      For Double Read/Write: address for operation 2.
      For Block Read: first word of block read data (Data0).

  - name: Op2 Read Data / Block Read Data1
    bits: "15:0"
    word: 6
    size_bits: 16
    description: >
      For Double Read: read data for operation 2.
      For Block Read: second word of block read data (Data1).

  - name: Reserved / Block Read Data2
    bits: "15:0"
    word: 7
    size_bits: 16
    description: >
      Reserved for non-Block operations.
      For Block Read: third word of block read data (Data2).

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: >
      16-bit CRC for error detection. High byte in word 8 bits [15:8],
      low byte in word 8 bits [7:0].
