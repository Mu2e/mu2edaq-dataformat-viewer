name: Data Request Packet
description: >
  Data Request packet sent from the DTC to a specific ROC on DMA channel 0.
  Unlike the Heartbeat (which is a broadcast), this packet is addressed to a
  specific ROC and triggers a data readout response. The response from the ROC
  consists of a Data Header Packet followed by zero or more Data Payload Packets.
  Optionally carries a debug request when the Debug bit is set.
packet_type: 0x2
size_bytes: 16
dma_channel: 0
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D2.y) prepended on
    transmission and stripped on receipt. 'y' is the packet sequence number
    (0-7, incrementing, wrapping).
  k_char: K28.0
  d_char: D2.y

fields:
  - name: Transfer Byte Count
    bits: "15:0"
    word: 0
    size_bits: 16
    description: >
      16-bit transfer byte count (high byte in bits 15:8, low byte in bits 7:0).
      Used by the DTC DMA engine.

  - name: Valid
    bits: "15"
    word: 1
    size_bits: 1
    description: Valid flag. Used by the DTC DMA engine.

  - name: Reserved
    bits: "14:11"
    word: 1
    size_bits: 4
    description: Reserved bits, should be zero.

  - name: ROC Link ID
    bits: "10:8"
    word: 1
    size_bits: 3
    description: >
      Specifies the link on the parent DTC that the target ROC is located on.
      The DTC's six optical links are numbered 0 through 5.

  - name: Packet Type
    bits: "7:4"
    word: 1
    size_bits: 4
    description: Packet type identifier. Always 0x2 for a Data Request Packet.
    fixed_value: 0x2

  - name: Reserved (low nibble)
    bits: "3:0"
    word: 1
    size_bits: 4
    description: Reserved bits, should be zero.

  - name: Event Window Tag byte 1
    bits: "15:8"
    word: 2
    size_bits: 8
    description: Byte 1 of the 48-bit Event Window Tag identifying the requested event window.

  - name: Event Window Tag byte 0
    bits: "7:0"
    word: 2
    size_bits: 8
    description: Byte 0 (least significant byte) of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 3
    bits: "15:8"
    word: 3
    size_bits: 8
    description: Byte 3 of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 2
    bits: "7:0"
    word: 3
    size_bits: 8
    description: Byte 2 of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 5
    bits: "15:8"
    word: 4
    size_bits: 8
    description: Byte 5 (most significant byte) of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 4
    bits: "7:0"
    word: 4
    size_bits: 8
    description: Byte 4 of the 48-bit Event Window Tag.

  - name: Reserved (word 5)
    bits: "15:0"
    word: 5
    size_bits: 16
    description: Reserved word, should be zero.

  - name: Debug Type
    bits: "15:12"
    word: 6
    size_bits: 4
    description: >
      4-bit debug type code indicating the type of debug data requested.
      Only meaningful when the Debug bit (bit 0 of word 6) is set to 1.
    values:
      0x0: "Special sequence"
      0x1: "External serial data"
      0x2: "External serial data with initial reset of FIFO"
      0x3: "Reserved"
      0x4: "Reserved"
      0x5: "Reserved"
      0x6: "Reserved"
      0x7: "Reserved"
      0x8: "Reserved"
      0x9: "Reserved"
      0xA: "Reserved"
      0xB: "Reserved"
      0xC: "Reserved"
      0xD: "Reserved"
      0xE: "Reserved"
      0xF: "Reserved"

  - name: Reserved (bits 11:1 of word 6)
    bits: "11:1"
    word: 6
    size_bits: 11
    description: Reserved bits, should be zero.

  - name: Debug
    bits: "0"
    word: 6
    size_bits: 1
    description: >
      Single-bit debug flag. When set to 1, indicates this is a data request
      for debugging purposes. When set, the Debug Type and Debug Packet Count
      fields are valid.
    values:
      0: "Normal data request"
      1: "Debug data request"

  - name: Reserved (bits 15:11 of word 7)
    bits: "15:11"
    word: 7
    size_bits: 5
    description: Reserved bits, should be zero.

  - name: Debug Packet Count
    bits: "10:0"
    word: 7
    size_bits: 11
    description: >
      When Debug bit is set, specifies the number of debug data packets
      requested from the ROC. Range: 0 to 2047.

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: >
      16-bit CRC for error detection. High byte in word 8 bits [15:8],
      low byte in word 8 bits [7:0].
