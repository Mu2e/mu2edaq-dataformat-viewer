name: Calorimeter Footer Packet
description: >
  The final packet in a calorimeter event data block. Sent after all Calo Hit
  Data Packets for the event window, this packet summarizes channel activity
  across all 20 channels of the ROC. It carries the Detector Type and Board ID
  (same as the hit headers), Channel Status Flags indicating which channels had
  hits in this event window, and reserved fields for DIRAC subsystem use.
  The detailed content may be further specified based on collaboration needs.
subsystem_id: 0x1
subsystem_name: Calorimeter
packet_type: 0x6
size_bytes: 16
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D6.y) prepended on
    transmission and stripped on receipt. 'y' is the packet sequence number.
  k_char: K28.0
  d_char: D6.y

fields:
  - name: Detector Type
    bits: "15:13"
    word: 0
    size_bits: 3
    description: >
      3-bit subdetector type identifier. Same encoding as in the hit header.
    values:
      0x0: "CALO - main calorimeter"
      0x1: "CAPHRI - calorimeter photon reference system"
      0x2: "TRAD - tracker radiation monitor"
      0x3: "LASER - laser calibration system"

  - name: Board ID
    bits: "12:5"
    word: 0
    size_bits: 8
    description: >
      8-bit unique board identifier (0 to 255). Same board as the hit data
      packets that preceded this footer.

  - name: Channel Status Flags A
    bits: "3:0"
    word: 0
    size_bits: 4
    description: >
      4-bit mask (Flag A) indicating which of the high-numbered channels had
      active hits in this event window. Bit mapping: bit 3 (high) corresponds
      to channel 19, bit 0 (low) corresponds to channel 16.
    notes: >
      Bit 3 = channel 19, Bit 2 = channel 18, Bit 1 = channel 17,
      Bit 0 = channel 16.

  - name: Channel Status Flags C
    bits: "15:0"
    word: 1
    size_bits: 16
    description: >
      16-bit Channel Status Flag C. Mask indicating active channels.
      Detailed bit-to-channel mapping to be further specified.

  - name: Reserved for DIRAC A
    bits: "15:0"
    word: 2
    size_bits: 16
    description: >
      16-bit reserved field for DIRAC A subsystem. Reserved for future use.

  - name: Reserved for DIRAC B
    bits: "15:0"
    word: 3
    size_bits: 16
    description: >
      16-bit reserved field for DIRAC B subsystem. Reserved for future use.

  - name: Reserved for DIRAC C
    bits: "15:0"
    word: 4
    size_bits: 16
    description: >
      16-bit reserved field for DIRAC C subsystem. Reserved for future use.

  - name: Reserved for DIRAC D
    bits: "15:0"
    word: 5
    size_bits: 16
    description: >
      16-bit reserved field for DIRAC D subsystem. Reserved for future use.

  - name: Reserved for DIRAC E
    bits: "15:0"
    word: 6
    size_bits: 16
    description: >
      16-bit reserved field for DIRAC E subsystem. Reserved for future use.

  - name: Reserved for DIRAC F
    bits: "15:0"
    word: 7
    size_bits: 16
    description: >
      16-bit reserved field for DIRAC F subsystem. Reserved for future use.

  - name: CRC
    bits: "15:0"
    word: 8
    size_bits: 16
    description: 16-bit CRC for error detection.

notes: >
  Channel Status Flags B (16 bits) covers channels 0-15: bit 15 = channel 15,
  bit 0 = channel 0. Channel Status Flags A (4 bits) covers channels 16-19.
  Together, Flags A and B provide a 20-bit channel activity mask for the ROC.
  The "Channel Status Flag C" field label in the document likely refers to
  what is effectively Flag B in the bit layout (16-bit word covering channels 0-15).
  The detailed content of the DIRAC reserved fields is to be specified based
  on collaboration needs.
