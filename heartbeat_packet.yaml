name: Heartbeat Packet
description: >
  Broadcast packet sent from the CFO (Command Fan-Out) through the DTC to all
  ROCs on DMA channel 0. Guaranteed to arrive at least 850 ns before the Event
  Marker indicating the start of the Event Window. Carries Event Window Tag and
  Event Mode information that configures ROCs for the NEXT Event Window. Used to
  control event reconstruction/filtering, ROC data taking, and ROC settings that
  must be synchronized to a specific microbunch (synchronous resets, digitization
  enable/disable, readout enable/disable, zero-suppression enable/disable,
  calibration signal injection, live gate expansion, etc.).
  The source is the CFO and each packet contains Event Window specific data
  stored in the CFO Heartbeat Information Table.
packet_type: 0x1
size_bytes: 16
dma_channel: 0
broadcast: true
serial_header:
  description: >
    2-byte hardware-generated serial header (K28.0 + D1.y) prepended on
    transmission and stripped on receipt. 'y' is the packet sequence number
    (0-7, incrementing, wrapping).
  k_char: K28.0
  d_char: D1.y

fields:
  - name: Transfer Byte Count
    bits: "15:0"
    word: 0
    size_bits: 16
    description: >
      16-bit transfer byte count (high byte in bits 15:8, low byte in bits 7:0).
      Used by the DTC DMA engine.

  - name: Valid
    bits: "15"
    word: 1
    size_bits: 1
    description: Valid flag. Used by the DTC DMA engine.

  - name: Reserved
    bits: "14:11"
    word: 1
    size_bits: 4
    description: Reserved bits, should be zero.

  - name: ROC Link ID
    bits: "10:8"
    word: 1
    size_bits: 3
    description: >
      Specifies the link on the parent DTC. For a broadcast heartbeat this
      identifies the originating link context.

  - name: Packet Type
    bits: "7:4"
    word: 1
    size_bits: 4
    description: Packet type identifier. Always 0x1 for a Heartbeat Packet.
    fixed_value: 0x1

  - name: Reserved (low nibble)
    bits: "3:0"
    word: 1
    size_bits: 4
    description: Reserved bits, should be zero.

  - name: Event Window Tag byte 1
    bits: "15:8"
    word: 2
    size_bits: 8
    description: >
      Byte 1 (second byte, bits 15:8 of the lower 16-bit word) of the
      48-bit Event Window Tag. The Event Window Tag uniquely identifies the
      event window. Bytes are ordered so that bytes 0 and 1 form one 16-bit
      word, bytes 2 and 3 form the next, and bytes 4 and 5 form the last.

  - name: Event Window Tag byte 0
    bits: "7:0"
    word: 2
    size_bits: 8
    description: >
      Byte 0 (least significant byte, bits 7:0) of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 3
    bits: "15:8"
    word: 3
    size_bits: 8
    description: Byte 3 of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 2
    bits: "7:0"
    word: 3
    size_bits: 8
    description: Byte 2 of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 5
    bits: "15:8"
    word: 4
    size_bits: 8
    description: Byte 5 (most significant byte) of the 48-bit Event Window Tag.

  - name: Event Window Tag byte 4
    bits: "7:0"
    word: 4
    size_bits: 8
    description: Byte 4 of the 48-bit Event Window Tag.

  - name: Event Mode Byte 1
    bits: "15:8"
    word: 5
    size_bits: 8
    description: >
      Event Mode Byte 1. Reserved for Tracker subsystem use. The high bit
      (bit 7) of a subsystem's mode byte is the 'active' bit: if set, the
      corresponding subsystem is expected to record data for that Event Window.
    notes: Reserved for Tracker (Trk) subsystem.

  - name: Event Mode Byte 0
    bits: "7:0"
    word: 5
    size_bits: 8
    description: >
      Event Mode Byte 0. Contains general event mode control bits used
      across subsystems.
    subfields:
      - name: Reserved
        bits: "7:3"
        size_bits: 5
        description: Reserved bits in Event Mode Byte 0.

      - name: Pattern Mode
        bits: "2:1"
        size_bits: 2
        description: >
          2-bit pattern mode field controlling data pattern generation or
          readout mode for the event window.

      - name: On-spill Flag
        bits: "0"
        size_bits: 1
        description: >
          Single bit flag indicating whether the event window is on-spill (1)
          or off-spill (0). During off-spill, the Delivery Ring RF Marker TDC
          value in word 8 will be 0.
        values:
          0: "Off-spill event window"
          1: "On-spill event window"

  - name: Event Mode Byte 3
    bits: "15:8"
    word: 6
    size_bits: 8
    description: >
      Event Mode Byte 3. Reserved for CRV (Cosmic Ray Veto) subsystem use.
      The high bit (bit 7) is the active bit for the CRV subsystem.
    notes: Reserved for CRV subsystem.

  - name: Event Mode Byte 2
    bits: "7:0"
    word: 6
    size_bits: 8
    description: >
      Event Mode Byte 2. Contains mode bits for the Calorimeter (Calo) and
      other subsystems.
    subfields:
      - name: Reserved for Calo
        bits: "7:1"
        size_bits: 7
        description: >
          Bits [7:1] of Event Mode Byte 2 are reserved for the Calorimeter
          (Calo) subsystem. Bit 7 is the Calo active bit.

      - name: TEM
        bits: "7:6"
        size_bits: 2
        description: >
          2-bit TEM (Trigger and Event Management) mode field within the
          Calo byte portion.

      - name: STM
        bits: "5:4"
        size_bits: 2
        description: >
          2-bit STM (Stopping Target Monitor) mode field. Bit 5 (high bit)
          is the STM active bit.

      - name: Calo Laser Injection / Injection Data Source
        bits: "0"
        size_bits: 1
        description: >
          Single bit flag. Interpreted as Calorimeter Laser Injection enable
          or Injection Data Source selector, depending on context.

  - name: Event Mode Byte 5 - Subrun Handling
    bits: "15:8"
    word: 7
    size_bits: 8
    description: >
      Subrun handling byte. Reserves three bits for subrun state indication.
      One approach designates one bit for current subrun odd/even state and
      another as a predictive bit for a future subrun transition. The predictive
      bit gives the software processing chain time to prepare; the current bit
      verifies the event is in the correct subrun.
    subfields:
      - name: Subrun Handling
        bits: "11:9"
        size_bits: 3
        description: >
          Three reserved bits for subrun handling. Bit definitions to be
          determined based on subrun management approach.

  - name: Delivery Ring RF-0 Marker TDC
    bits: "15:8"
    word: 8
    size_bits: 8
    description: >
      8-bit unsigned value representing the time prediction (in units of
      800 MHz / 1.25 ns periods) of the offset position of the Delivery Ring
      Marker with respect to the start of the Event Window (defined by the
      rising edge of the 40 MHz 25 ns System Clock and the Event Window Marker).
      During off-spill, this value is 0.

  - name: CRC
    bits: "15:0"
    word: 9
    size_bits: 16
    description: >
      16-bit CRC for error detection. High byte in word 9 bits [15:8],
      low byte in word 9 bits [7:0].

notes: >
  The Event Mode for each subsystem uses the high bit (bit 7 of its byte, or
  bit 1 of a 2-bit mode) as the 'active' bit. If the active bit is set, the
  corresponding subsystem is expected to record data for that Event Window.
  The DTC may decode the CFO Event Mode byte into per-ROC-link mode using a
  lookup table populated by DMA.
  Subsystem IDs: 0 = Tracker, 1 = Calorimeter, 2 = CRV, 4 = STM, 5 = ExtMon,
  7 = TDAQ.
